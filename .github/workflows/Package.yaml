name: Package
on: workflow_dispatch

jobs:
  Package:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: 'Have a Look'
      run: ls -alh

    - name: Setup Nodejs
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install Dependencies
      run: npm install


    - name: Install vsce
      run: npm install -g vsce

    - name: Packaging
      run: vsce package

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        path: ./*.vsix
